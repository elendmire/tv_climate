name: Collect news data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *"

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: true

jobs:
  collect-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: collector/requirements.txt

      - name: Install collector
        run: pip install -r collector/requirements.txt

      - name: Run collector
        working-directory: collector
        run: python -m tr_climate collect

      - name: Data quality checks
        working-directory: collector
        run: |
          python -m tr_climate quality --data ../web/public/data/items.json
          python <<'PY'
          import json
          from pathlib import Path
          man = json.loads(Path("../web/public/data/manifest.json").read_text(encoding="utf-8"))
          for sid, n in (man.get("per_source_counts") or {}).items():
              if n == 0:
                  print(f"::warning title=Empty source::{sid} returned 0 items in the last run")
          for err in man.get("errors") or []:
              print(f"::warning title=Collector error::{err}")
          if man.get("item_count", 0) == 0:
              print("::warning title=No items::items.json is empty")
          PY

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/items.json web/public/data/manifest.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): refresh news snapshot [skip actions]"
            git push
          fi
